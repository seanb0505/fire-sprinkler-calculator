<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fire Protection Estimator V6</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }

    header {
      padding: 36px 20px;
      text-align: center;
      background: #111827;
      border-bottom: 1px solid #334155;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      color: #cbd5e1;
      margin-top: 10px;
    }

    main {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 22px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    h2 { margin-top: 0; }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 17px;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    .print-btn { background: #16a34a; }
    .print-btn:hover { background: #15803d; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .summary-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
    }

    .summary-box strong {
      display: block;
      color: #93c5fd;
      margin-bottom: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      background: #0f172a;
      overflow: hidden;
      border-radius: 10px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
      font-size: 14px;
    }

    th { background: #334155; }

    .total {
      font-size: 24px;
      font-weight: bold;
      color: #22c55e;
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      margin: 4px;
      font-size: 13px;
      background: #2563eb;
    }

    .good-tag { background: #166534; }
    .warning-tag { background: #92400e; }
    .ai-tag { background: #6d28d9; }

    .notice {
      background: #1e3a8a;
      color: #dbeafe;
      padding: 14px;
      border-radius: 8px;
      margin-top: 14px;
      line-height: 1.4;
    }

    #pdfPreview, #aiJsonPreview {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      max-height: 260px;
      overflow: auto;
      white-space: pre-wrap;
      font-size: 13px;
      color: #cbd5e1;
    }

    .proposal {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .proposal h1, .proposal h2, .proposal h3 {
      color: black;
    }

    .proposal-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    .proposal-table th, .proposal-table td {
      border: 1px solid #ccc;
      padding: 10px;
      color: black;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      main { padding: 14px; }
      header h1 { font-size: 26px; }
    }

    @media print {
      body { background: white; }
      header, .card:not(.print-area) { display: none; }
      .print-area {
        display: block;
        box-shadow: none;
        background: white;
        color: black;
      }
      .proposal {
        box-shadow: none;
        padding: 0;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Fire Protection Estimator</h1>
  <p>Reference Drawing Library • PDF Text Reading • AI-Ready Takeoff Engine</p>
</header>

<main>

<section class="card">
  <h2>Project Information</h2>

  <label>Project Name</label>
  <input id="projectName" type="text">

  <label>Customer Name</label>
  <input id="customerName" type="text">

  <label>Location</label>
  <input id="location" type="text">
</section>

<section class="card">
  <h2>Estimate Settings</h2>

  <div class="grid">
    <div>
      <label>Labour Rate ($/hr)</label>
      <input id="labourRate" type="number" value="95">
    </div>

    <div>
      <label>Markup %</label>
      <input id="markup" type="number" value="35">
    </div>
  </div>

  <label>Estimate Type</label>
  <select id="estimateType">
    <option value="service">Service / T&M</option>
    <option value="tenant">Tenant Fit-Out</option>
    <option value="newbuild">New Build</option>
    <option value="retrofit">Retrofit / Renovation</option>
    <option value="warehouse">Warehouse / Industrial</option>
  </select>

  <label>System Type</label>
  <select id="systemType">
    <option value="wet">Wet System</option>
    <option value="dry">Dry System</option>
    <option value="preaction">Pre-Action System</option>
    <option value="esfr">ESFR / Warehouse System</option>
  </select>

  <label>Reference Drawing Type</label>
  <select id="referenceType">
    <option value="auto">Auto Detect From PDF / Notes</option>
