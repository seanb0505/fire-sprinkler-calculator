<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprinkler Takeoff</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Fire Sprinkler Estimator</h1>
  <p>Material & Labour Estimating for Sprinkler Contractors</p>
</header>

<main class="container">

  <section class="card">
    <h2>Estimate Calculator</h2>

    <label>New Heads</label>
    <input type="number" id="newHeads" value="0">

    <label>Relocated Heads</label>
    <input type="number" id="relocateHeads" value="0">

    <label>Labour Rate ($/hr)</label>
    <input type="number" id="labourRate" value="120">

    <button onclick="calculateEstimate()">Calculate Estimate</button>
  </section>

  <section class="card results">
    <h2>Results</h2>
    <p>Total Labour Hours: <span id="hours">0</span></p>
    <p>Estimated Labour Cost: $<span id="cost">0.00</span></p>
  </section>

</main>

<script>
function calculateEstimate() {
  let newHeads = Number(document.getElementById("newHeads").value);
  let relocateHeads = Number(document.getElementById("relocateHeads").value);
  let labourRate = Number(document.getElementById("labourRate").value);

  let totalHours = newHeads + relocateHeads;
  let labourCost = totalHours * labourRate;

  document.getElementById("hours").innerText = totalHours;
  document.getElementById("cost").innerText = labourCost.toFixed(2);
}
</script>

</body>
</html>
