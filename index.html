<!DOCTYPE html>
<html>
<head>
  <title>Fire Sprinkler Estimator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0f172a;
      text-align: center;
      padding: 30px 15px;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .box {
      background: #1f2937;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #2563eb;
      color: white;
      margin-top: 20px;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #374151;
      text-align: left;
    }

    th {
      color: #93c5fd;
    }
  </style>
</head>

<body>
  <header>
    <h1>Fire Sprinkler Estimator</h1>
    <p>Basic material and labour calculator</p>
  </header>

  <main>
    <div class="box">
      <h2>Project Information</h2>

      <label>Project Name</label>
      <input id="projectName" type="text" placeholder="Project name">

      <label>Customer Name</label>
      <input id="customerName" type="text" placeholder="Customer name">

      <label>Location</label>
      <input id="location" type="text" placeholder="Location">
    </div>

    <div class="box">
      <h2>Sprinkler Work</h2>

      <label>Work Type</label>
      <select id="workType">
        <option value="new">New Drops</option>
        <option value="relocate">Relocates</option>
      </select>

      <label>Drop Type</label>
      <select id="dropType">
        <option value="hardpipe">Hard Pipe</option>
        <option value="flex">Flex Drop</option>
      </select>

      <label>Number of Heads</label>
      <input id="heads" type="number" value="1">

      <label>Mechanical Tee</label>
      <select id="teeType">
        <option value="none">No Mechanical Tee</option>
        <option value="2 x 1 Mechanical Tee">2 inch x 1 inch Mechanical Tee</option>
        <option value="2 x 3/4 Mechanical Tee">2 inch x 3/4 inch Mechanical Tee</option>
        <option value="2 x 1/2 Mechanical Tee">2 inch x 1/2 inch Mechanical Tee</option>
      </select>

      <label>Average 1 inch Pipe Per Head</label>
      <input id="pipePerHead" type="number" value="10">

      <label>Labour Hours Per Head</label>
      <input id="hoursPerHead" type="number" value="1" step="0.25">

      <label>Labour Rate Per Hour</label>
      <input id="labourRate" type="number" value="95">

      <label>Material Markup Percent</label>
      <input id="markup" type="number" value="20">

      <button onclick="calculateEstimate()">Calculate Estimate</button>
    </div>

    <div class="box">
      <h2>Estimate Summary</h2>
      <p><strong>Total Heads:</strong> <span id="summaryHeads">0</span></p>
      <p><strong>Total Pipe:</strong> <span id="summaryPipe">0 ft</span></p>
      <p><strong>Labour Hours:</strong> <span id="summaryHours">0 hrs</span></p>
      <p><strong>Material Total:</strong> <span id="summaryMaterial">$0.00</span></p>
      <p><strong>Labour Total:</strong> <span id="summaryLabour">$0.00</span></p>
      <p><strong>Total Estimate:</strong> <span id="summaryTotal">$0.00</span></p>
    </div>

    <div class="box">
      <h2>Material List</h2>
      <table>
        <thead>
          <tr>
            <th>Material</th>
            <th>Qty</th>
            <th>Unit</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="materialTable"></tbody>
      </table>
    </div>
  </main>

  <script>
    function money(amount) {
      return "$" + amount.toFixed(2);
    }

    function addMaterial(list, name, qty, unitCost) {
      list.push({
        name: name,
        qty: qty,
        unitCost: unitCost,
        total: qty * unitCost
      });
    }

    function calculateEstimate() {
      var workType = document.getElementById("workType").value;
      var dropType = document.getElementById("dropType").value;
      var heads = Number(document.getElementById("heads").value);
      var teeType = document.getElementById("teeType").value;
      var pipePerHead = Number(document.getElementById("pipePerHead").value);
      var hoursPerHead = Number(document.getElementById("hoursPerHead").value);
      var labourRate = Number(document.getElementById("labourRate").value);
      var markup = Number(document.getElementById("markup").value);

      if (isNaN(heads)) heads = 0;
      if (isNaN(pipePerHead)) pipePerHead = 0;
      if (isNaN(hoursPerHead)) hoursPerHead = 0;
      if (isNaN(labourRate)) labourRate = 0;
      if (isNaN(markup)) markup = 0;

      var materials = [];
      var totalPipe = heads * pipePerHead;

      if (dropType === "hardpipe") {
        addMaterial(materials, "1 inch Schedule 40 Black Pipe", totalPipe, 4.50);
        addMaterial(materials, "1 inch 90 Elbows", heads * 3, 3.25);
        addMaterial(materials, "1 inch x 2 inch Nipple", heads, 2.75);
      }

      if (dropType === "flex") {
        addMaterial(materials, "Flex Drop Assembly", heads, 42.00);
      }

      addMaterial(materials, "1 inch Hanger", heads, 4.25);
      addMaterial(materials, "Rod Assembly", heads, 3.50);
      addMaterial(materials, "Sprinkler Head", heads, 18.00);

      if (workType === "new" && teeType !== "none") {
        addMaterial(materials, teeType, heads, 18.00);
      }

      var materialSubtotal = 0;

      for (var i = 0; i < materials.length; i++) {
        materialSubtotal = materialSubtotal + materials[i].total;
      }

      var materialMarkup = materialSubtotal * (markup / 100);
      var materialTotal = materialSubtotal + materialMarkup;
      var labourHours = heads * hoursPerHead;
      var labourTotal = labourHours * labourRate;
      var totalEstimate = materialTotal + labourTotal;

      document.getElementById("summaryHeads").innerText = heads;

      if (dropType === "hardpipe") {
        document.getElementById("summaryPipe").innerText = totalPipe + " ft";
      } else {
        document.getElementById("summaryPipe").innerText = "N/A";
      }

      document.getElementById("summaryHours").innerText = labourHours + " hrs";
      document.getElementById("summaryMaterial").innerText = money(materialTotal);
      document.getElementById("summaryLabour").innerText = money(labourTotal);
      document.getElementById("summaryTotal").innerText = money(totalEstimate);

      var table = document.getElementById("materialTable");
      table.innerHTML = "";

      for (var j = 0; j < materials.length; j++) {
        var row = document.createElement("tr");

        row.innerHTML =
          "<td>" + materials[j].name + "</td>" +
          "<td>" + materials[j].qty + "</td>" +
          "<td>" + money(materials[j].unitCost) + "</td>" +
          "<td>" + money(materials[j].total) + "</td>";

        table.appendChild(row);
      }

      var markupRow = document.createElement("tr");
      markupRow.innerHTML =
        "<td><strong>Material Markup</strong></td>" +
        "<td>" + markup + "%</td>" +
        "<td>-</td>" +
        "<td><strong>" + money(materialMarkup) + "</strong></td>";

      table.appendChild(markupRow);

      var totalRow = document.createElement("tr");
      totalRow.innerHTML =
        "<td><strong>Material Total</strong></td>" +
        "<td>-</td>" +
        "<td>-</td>" +
        "<td><strong>" + money(materialTotal) + "</strong></td>";

      table.appendChild(totalRow);
    }

    calculateEstimate();
  </script>
</body>
</html>
